name: Update Discord Stats

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests loguru python-dotenv

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}
          GUILD_ID=${{ secrets.GUILD_ID }}
          SOCIALDATA_API_KEY=${{ secrets.SOCIALDATA_API_KEY }}
          TWITTER_LINKS_CHANNEL_ID=${{ secrets.TWITTER_LINKS_CHANNEL_ID }}

          MODE=incremental
          BUILD_TWITTER_STATS=1
          BUILD_MESSAGE_JSON=0
          FETCH_ROLES=0

          CHECKPOINT_PATH=checkpoint.json
          EXPORT_PATH=user_stats.json
          MESSAGES_JSONL_PATH=messages.jsonl
          MESSAGES_EXPORT_PATH=message.json
          POSTS_EXPORT_PATH=posts.json
          SOCIALDATA_CACHE_PATH=socialdata_cache.json

          HEARTBEAT_SEC=10
          LOG_EVERY_PAGES=50
          EOF

      - name: Run parser
        run: python message_v7.py

      - name: Commit only required files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add checkpoint.json user_stats.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "auto: update stats"
          git push
